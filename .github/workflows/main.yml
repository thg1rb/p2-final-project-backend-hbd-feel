name: Laravel CI/CD to Local K8S

on:
  push:
    branches:
      - main
      - develop
      - feature/setup-cicd

jobs:
  # JOB 1: ทดสอบโค้ด (รันบน C loud ของ GitHub เพื่อความเร็ว)
  laravel-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=20s
          --health-timeout=10s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          # เพิ่ม pcov เข้าไปใน extensions เพื่อให้ PHP รองรับการทำ Coverage
          extensions: mbstring, dom, curl, libxml, mysql, pcov
          coverage: pcov # เปิดใช้งาน pcov

      - name: Install Dependencies
        run: |
          php -r "copy('.env.example', '.env');"
          composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
          php artisan key:generate

      - name: Install NPM dependencies & Build Assets
        run: |
          npm install
          npm run build

      - name: Run Tests and Generate Coverage
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: password
        # เพิ่ม Flag --coverage-clover เพื่อบอกให้ Laravel สร้างไฟล์ coverage.xml
        run: php artisan test --coverage-clover=coverage.xml

      # สเต็ปใหม่: ส่งข้อมูลไปให้ SonarQube
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          # แนะนำให้ตั้งชื่อ Secret แยกจาก Frontend เช่น SONAR_TOKEN_BACKEND
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=myapp-backend
            -Dsonar.sources=app,routes,database,config
            -Dsonar.tests=tests
            -Dsonar.php.coverage.reportPaths=coverage.xml
            -Dsonar.exclusions=vendor/**,node_modules/**,public/**,bootstrap/cache/**

  # JOB 2: Build Docker Image (ถ้าจะใช้ K8S ต้องมีขั้นตอนนี้เพื่อให้ K8S ดึงภาพไปรันได้)
  build-docker:
    needs: laravel-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
#          tags: ${{ secrets.DOCKERHUB_USERNAME }}/laravel-app:latest
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/laravel-app:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/laravel-app:latest

  # JOB 3: สั่ง K8S ในเครื่อง Local (รันบน Self-hosted Runner)
  # JOB 3: สั่ง K8S ในเครื่อง Local (รันบน Self-hosted Runner)
  deploy-local:
    needs: build-docker
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set Environment Variables
        run: |
            if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
              echo "APP_HOST=prod.api.k8s.dev" >> $GITHUB_ENV
              echo "K8S_NAMESPACE=production" >> $GITHUB_ENV
            else
              echo "APP_HOST=uat.api.k8s.dev" >> $GITHUB_ENV
              echo "K8S_NAMESPACE=uat" >> $GITHUB_ENV
            fi

      - name: Deploy to K8S
        run: |
          # 1. สร้าง Namespace ถ้ายังไม่มี
          kubectl create namespace ${K8S_NAMESPACE} --dry-run=client -o yaml | kubectl apply -f -

          # 2. สร้าง/อัปเดต Secret
          kubectl create secret generic laravel-secrets \
            --from-literal=APP_KEY="${{ secrets.LARAVEL_APP_KEY }}" \
            --from-literal=DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            -n ${K8S_NAMESPACE} --dry-run=client -o yaml | kubectl apply -f -

          # 3. Apply K8S files
          kubectl apply -f k8s/ -n ${K8S_NAMESPACE}

          kubectl patch ingress laravel-ingress \
          -n ${K8S_NAMESPACE} \
          --type=json \
          -p='[{"op": "replace", "path": "/spec/rules/0/host", "value": "'"${APP_HOST}"'"}]'

          # 4. ตั้งค่า APP_URL แบบ dynamic (แทน sed)
          kubectl set env deployment/laravel-app \
            APP_URL=https://${APP_HOST} \
            -n ${K8S_NAMESPACE}

          # 5. Force update image ด้วย SHA
          kubectl set image deployment/laravel-app \
            laravel=${{ secrets.DOCKERHUB_USERNAME }}/laravel-app:${{ github.sha }} \
            -n ${K8S_NAMESPACE}

