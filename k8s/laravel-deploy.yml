apiVersion: apps/v1
kind: Deployment
metadata:
  name: laravel-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: laravel
  template:
    metadata:
      labels:
        app: laravel
    spec:
      containers:
        - name: laravel
          image: coconutdog5321/laravel-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          env:
            - name: APP_ENV
              value: local        # 🌟 1. เปลี่ยนจาก production เป็น local
            - name: APP_DEBUG
              value: "false"       # 🌟 2. เพิ่มบรรทัดนี้ เพื่อเปิดโหมดโชว์ Error หน้าเว็บ

            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: laravel-secrets
                  key: APP_KEY

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: laravel-secrets
                  key: DB_PASSWORD
            - name: DB_CONNECTION
              value: mysql
            - name: DB_HOST
              value: mysql # ชื่อ Service ของ MySQL ใน K8s
            - name: DB_PORT
              value: "3306"
            - name: DB_DATABASE
              value: nisit-reward
            - name: DB_USERNAME
              value: laravel
            - name: APP_URL
              value: "http://laravel.local:8000"
            - name: FILESYSTEM_DISK
              value: local
            - name: AWS_URL
              value: ""
            - name: AWS_ENDPOINT
              value: ""
            - name: LOG_CHANNEL
              value: stderr  # ให้ K8s เก็บ Log ได้ถูกต้อง


---
apiVersion: v1
kind: Service
metadata:
  name: laravel-service
spec:
  type: NodePort
  selector:
    app: laravel
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30007

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: laravel-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: laravel.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: laravel-service
                port:
                  number: 80
