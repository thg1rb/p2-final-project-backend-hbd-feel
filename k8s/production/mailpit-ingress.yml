apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mailpit-ingress
spec:
  ingressClassName: nginx
  rules:
    - host: mail.nisit-deeden.k8s.dev 
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mailpit 
                port:
                  number: 8025